<header innerHTML="{{header}}">
  <h1 *ngIf="!production">{{ title }}</h1>
</header>
<aside id="messages"><lib-messages></lib-messages></aside>
<div id="main">
  <nav>
  </nav>
  <article>
    <router-outlet></router-outlet>
  </article>
  <aside><!-- user info --></aside>
</div>
<div id="keepalive-tasks">
  <lib-task
    *ngFor="let threadId of searchHistoryThreads"
    [threadId]="threadId"
    [autoOpenResults]="false"
    [purgeHistoryIfInvalid]="true"></lib-task>
</div>
<footer innerHTML="{{footer}}"></footer>
